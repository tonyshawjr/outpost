 <h1>Pagination</h1>
 <p class="lead">Split long lists across multiple pages. One option on the loop, one tag after it — pagination handles the rest automatically.</p>
 </div>
 <div class="content">

 <h2>Setup</h2>
 <p>Add <code>paginate:N</code> to a collection loop and place <code>&lt;outpost-pagination /&gt;</code> immediately after the closing <code>&lt;/outpost-each&gt;</code>. That is all that is required.</p>
