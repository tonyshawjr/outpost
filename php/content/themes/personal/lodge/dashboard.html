<outpost-include partial="head"></outpost-include>
<div class="lodge-dashboard">
  <div class="lodge-header">
    <h1>My Dashboard</h1>
    <a href="/lodge/profile" class="lodge-btn lodge-btn-secondary">Profile</a>
  </div>

  <outpost-lodge-dashboard>
    <div class="lodge-items-section">
      <outpost-lodge-items collection="*">
        <div class="lodge-item-card">
          <div class="lodge-item-info">
            <h3 data-outpost="title">Item Title</h3>
            <span class="lodge-status" data-outpost="status">draft</span>
          </div>
          <div class="lodge-item-actions">
            <a data-bind="href:lodge_edit_url" class="lodge-btn lodge-btn-sm">Edit</a>
          </div>
        </div>
      </outpost-lodge-items>
    </div>
  </outpost-lodge-dashboard>
</div>

<style>
  .lodge-dashboard { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
  .lodge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .lodge-header h1 { font-size: 28px; font-weight: 600; margin: 0; }
  .lodge-item-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #eee; }
  .lodge-item-info h3 { font-size: 16px; font-weight: 500; margin: 0 0 4px; }
  .lodge-status { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
  .lodge-btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; }
  .lodge-btn-secondary { background: #f5f5f5; color: #333; }
  .lodge-btn-sm { padding: 4px 12px; font-size: 13px; background: #f5f5f5; color: #333; }
  .lodge-btn:hover { opacity: 0.8; }
</style>

<outpost-include partial="footer"></outpost-include>
