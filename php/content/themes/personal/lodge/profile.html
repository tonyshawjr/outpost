<outpost-include partial="head"></outpost-include>
<div class="lodge-profile">
  <div class="lodge-header">
    <h1>My Profile</h1>
    <a href="/lodge" class="lodge-btn lodge-btn-secondary">Back to Dashboard</a>
  </div>

  <form id="lodge-profile-form" class="lodge-form">
    <div class="lodge-field">
      <label>Display Name</label>
      <input type="text" name="display_name" id="profile-name" />
    </div>
    <div class="lodge-field">
      <label>Email</label>
      <input type="email" name="email" id="profile-email" />
    </div>
    <div class="lodge-field">
      <label>Bio</label>
      <textarea name="bio" id="profile-bio" rows="4"></textarea>
    </div>
    <button type="submit" class="lodge-btn lodge-btn-primary">Save Profile</button>
  </form>
</div>

<script>
  // Load profile data on mount
  (async () => {
    const token = localStorage.getItem('outpost_member_token');
    if (!token) { window.location.href = '/outpost/member-pages/login.php?return=/lodge/profile'; return; }

    const res = await fetch('/outpost/member-api.php?action=lodge/profile', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) return;
    const data = await res.json();
    const p = data.profile;
    document.getElementById('profile-name').value = p.display_name || '';
    document.getElementById('profile-email').value = p.email || '';
    document.getElementById('profile-bio').value = p.bio || '';
  })();

  document.getElementById('lodge-profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = localStorage.getItem('outpost_member_token');
    const body = {
      display_name: document.getElementById('profile-name').value,
      email: document.getElementById('profile-email').value,
      bio: document.getElementById('profile-bio').value,
    };
    const res = await fetch('/outpost/member-api.php?action=lodge/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.success) alert('Profile saved!');
    else alert(data.error || 'Error saving profile');
  });
</script>

<style>
  .lodge-profile { max-width: 480px; margin: 0 auto; padding: 40px 24px; }
  .lodge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .lodge-header h1 { font-size: 24px; font-weight: 600; margin: 0; }
  .lodge-form { display: flex; flex-direction: column; gap: 20px; }
  .lodge-field { display: flex; flex-direction: column; gap: 6px; }
  .lodge-field label { font-size: 13px; font-weight: 500; color: #555; }
  .lodge-field input, .lodge-field textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; font-family: inherit; }
  .lodge-field input:focus, .lodge-field textarea:focus { outline: none; border-color: #333; }
  .lodge-btn { display: inline-block; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
  .lodge-btn-primary { background: #1a1a1a; color: #fff; }
  .lodge-btn-secondary { background: #f5f5f5; color: #333; }
</style>

<outpost-include partial="footer"></outpost-include>
