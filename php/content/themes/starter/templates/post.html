<outpost-include partial="partials/head" />
<outpost-include partial="partials/header" />
<main class="post-content">
  <article class="post-article">
    <header class="post-header">
      <h1 class="post-title" data-outpost="title">Post Title</h1>
      <div class="post-meta">
        <span data-outpost="author">Author</span>
        <span>&middot;</span>
        <time data-outpost="published_at" data-bind="datetime:published_at">Date</time>
      </div>
    </header>
    <div class="post-body" data-outpost="body" data-type="richtext">
      Post content goes here.
    </div>
  </article>
</main>
<outpost-include partial="partials/footer" />
