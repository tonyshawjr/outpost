<!-- outpost:stats-row -->
<section class="outpost-stats-row py-14 px-6" style="background: var(--outpost-gray-50);">
  <div class="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
    <div class="flex flex-col gap-2">
      <span class="text-4xl font-extrabold tracking-tight" style="color: var(--outpost-primary);" data-outpost="stat1_number">95%</span>
      <span class="text-sm" style="color: var(--outpost-gray-500);" data-outpost="stat1_label">Graduation Rate</span>
    </div>
    <div class="flex flex-col gap-2">
      <span class="text-4xl font-extrabold tracking-tight" style="color: var(--outpost-primary);" data-outpost="stat2_number">200+</span>
      <span class="text-sm" style="color: var(--outpost-gray-500);" data-outpost="stat2_label">Programs Offered</span>
    </div>
    <div class="flex flex-col gap-2">
      <span class="text-4xl font-extrabold tracking-tight" style="color: var(--outpost-primary);" data-outpost="stat3_number">15:1</span>
      <span class="text-sm" style="color: var(--outpost-gray-500);" data-outpost="stat3_label">Student-Faculty Ratio</span>
    </div>
    <div class="flex flex-col gap-2">
      <span class="text-4xl font-extrabold tracking-tight" style="color: var(--outpost-primary);" data-outpost="stat4_number">50K+</span>
      <span class="text-sm" style="color: var(--outpost-gray-500);" data-outpost="stat4_label">Alumni Worldwide</span>
    </div>
  </div>
</section>
