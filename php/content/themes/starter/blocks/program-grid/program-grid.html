<!-- outpost:program-grid -->
<section class="outpost-program-grid">
  <div class="outpost-program-grid__inner">
    <div class="outpost-program-grid__header">
      <h2 class="outpost-program-grid__title" data-outpost="grid_title">Explore Our Programs</h2>
      <p class="outpost-program-grid__subtitle" data-outpost="grid_subtitle">Find the program that's right for you</p>
    </div>
    <div class="outpost-program-grid__cards">
      <outpost-each collection="programs">
        <a class="outpost-program-grid__card" href="{{url}}">
          <h3 class="outpost-program-grid__card-title">{{title}}</h3>
          <span class="outpost-program-grid__card-area">{{area}}</span>
          <span class="outpost-program-grid__card-credentials">{{credential_count}} credential(s)</span>
        </a>
      </outpost-each>
    </div>
    <div class="outpost-program-grid__footer">
      <a class="outpost-program-grid__view-all" href="/programs">View All Programs</a>
    </div>
  </div>
</section>
<!-- /outpost:program-grid -->
