<!-- outpost:transfer-lookup -->
<!-- outpost-settings: bg_color: color(#f8f9fa) -->
<section class="kenii-transfer-lookup" style="background: var(--block-bg-color, var(--kenii-gray-50));">
  <div class="kenii-transfer-lookup__inner">
    <h2 class="kenii-transfer-lookup__title" data-outpost="lookup_title">Transfer Credit Lookup</h2>
    <p class="kenii-transfer-lookup__subtitle" data-outpost="lookup_subtitle">See how your credits transfer to our programs</p>
    <div class="kenii-transfer-lookup__search">
      <input class="kenii-transfer-lookup__input" type="text" placeholder="Enter your previous institution or course..." />
      <button class="kenii-transfer-lookup__button" type="button">Search</button>
    </div>
    <div class="kenii-transfer-lookup__results">
      <p class="kenii-transfer-lookup__results-placeholder">Search results will appear here</p>
    </div>
  </div>
</section>
<!-- /outpost:transfer-lookup -->
