<!-- outpost:news-feed -->
<section class="kenii-news-feed">
  <div class="kenii-news-feed__inner">
    <h2 class="kenii-news-feed__title" data-outpost="feed_title">Latest News</h2>
    <div class="kenii-news-feed__grid">
      <outpost-each collection="posts" limit="3">
        <article class="kenii-news-feed__card">
          <div class="kenii-news-feed__image">
            <img src="" alt="Post thumbnail" />
          </div>
          <div class="kenii-news-feed__body">
            <time class="kenii-news-feed__date"></time>
            <h3 class="kenii-news-feed__headline"></h3>
            <p class="kenii-news-feed__excerpt"></p>
            <span class="kenii-news-feed__author"></span>
          </div>
        </article>
      </outpost-each>
    </div>
  </div>
</section>
<!-- /outpost:news-feed -->
