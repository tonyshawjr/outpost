<nav style="padding: 24px 0; border-bottom: 1px solid #eee;">
  <div class="container text-center">
    <div class="mb-4">
      <a href="/" style="text-decoration: none; color: inherit;">
        {% if @site_logo %}
        <img src="{{ @site_logo | image }}" alt="{{ @site_name }}" style="height: 36px; margin: 0 auto;">
        {% else %}
        <span class="font-bold text-xl">{{ @site_name }}</span>
        {% endif %}
      </a>
    </div>
    <div class="flex gap-4" style="justify-content: center; align-items: center;">
      {% for link in menu.main %}
      <a href="{{ link.url }}" class="text-sm" style="text-decoration: none; color: inherit;">{{ link.label }}</a>
      {% endfor %}
    </div>
  </div>
</nav>
