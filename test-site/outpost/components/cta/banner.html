<section class="section" style="background: var(--brand-primary, #111); color: #fff; padding: 64px 0;">
  <div class="container">
    <div class="flex" style="align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px;">
      <div>
        <h2 class="text-2xl font-bold mb-2" style="color: #fff;">{{ banner_heading }}Start building your site today{{ /banner_heading }}</h2>
        <p style="color: rgba(255,255,255,0.75);">{{ banner_subtitle }}No credit card required. Free 14-day trial.{{ /banner_subtitle }}</p>
      </div>
      <a href="{{ banner_cta_link }}#{{ /banner_cta_link }}" class="btn btn-lg" style="background: #fff; color: #111;">{{ banner_cta_text }}Get Started Free{{ /banner_cta_text }}</a>
    </div>
  </div>
</section>
