<section class="section">
  <div class="container" style="max-width: 720px;">
    <div class="mb-12">
      <h2 class="text-3xl font-bold mb-3">{{ blog_heading }}Blog{{ /blog_heading }}</h2>
      <p class="text-lg text-muted">{{ blog_subtitle }}Read our latest articles and updates.{{ /blog_subtitle }}</p>
    </div>
    <div class="flex flex-col gap-8">
      {% for item in collection.post %}
      <a href="{{ item.url }}" style="text-decoration: none; color: inherit; display: block; padding-bottom: 32px; border-bottom: 1px solid #eee;">
        <div class="text-xs text-muted mb-2">{{ item.date }}</div>
        <h3 class="text-xl font-semibold mb-2">{{ item.title }}</h3>
        <p class="text-muted">{{ item.excerpt }}</p>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
