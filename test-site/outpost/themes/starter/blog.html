{% include 'head' %}
{% include 'nav' %}

<div class="page-header">
    <h1>{{ blog_title }}</h1>
    <p>{{ blog_subtitle }}</p>
</div>

<div class="content">
    <div class="post-list">
        {% for post in collection.blog %}
            <article class="post-card">
                <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                <p class="post-excerpt">{{ post.excerpt }}</p>
                <time class="post-date">{{ post.published_at }}</time>
            </article>
        {% endfor %}
    </div>
</div>

{% include 'footer' %}
